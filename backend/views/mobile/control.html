<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手机播控台</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:16px;background:#f5f7fa;color:#222}
    .card{background:#fff;border-radius:12px;padding:14px;border:1px solid #eaeaea;margin-bottom:12px}
    .row{display:flex;gap:8px}
    button{flex:1;height:40px;border:none;border-radius:8px;background:#07c160;color:#fff;font-size:14px}
    .secondary{background:#3b82f6}
    .danger{background:#ef4444}
    .muted{background:#64748b}
    .effect-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}
    input{width:100%;height:38px;border:1px solid #ddd;border-radius:8px;padding:0 10px;margin-top:8px}
    .msg{font-size:12px;color:#666;margin-top:8px}
    .status{display:flex;flex-direction:column;gap:4px;font-size:13px;color:#475569;margin-top:10px}
    .track-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;max-height:320px;overflow:auto}
    .track-item{border:1px solid #e5e7eb;border-radius:10px;padding:10px 12px}
    .track-item.active{border-color:#07c160;background:#f0fff7}
    .track-title{font-size:14px;font-weight:600;color:#1f2937}
    .track-meta{font-size:12px;color:#64748b;margin-top:4px}
    .track-actions{display:flex;gap:8px;margin-top:10px}
    .track-actions button{height:34px;font-size:13px}
  </style>
</head>
<body>
  <div class="card">
    <h3>后端播放控制</h3>
    <div class="row">
      <button class="secondary" onclick="controlBackend('pause')">暂停</button>
      <button class="muted" onclick="controlBackend('resume')">恢复</button>
      <button class="danger" onclick="controlBackend('stop')">停止</button>
    </div>
    <div class="msg" id="playMsg">等待操作...</div>
    <div class="status" id="playStatus">
      <span>状态：加载中...</span>
    </div>
  </div>

  <div class="card">
    <h3>节目列表</h3>
    <div class="msg">点击“播放到后端”后，即使前端页面关闭，只要服务还在运行，后端也会继续输出。</div>
    <div class="track-list" id="trackList">
      <div class="msg">正在加载节目列表...</div>
    </div>
  </div>

  <div class="card">
    <h3>节目效果音</h3>
    <div class="effect-grid">
      <button onclick="sendEffect('大笑')">大笑</button>
      <button onclick="sendEffect('拍手')">拍手</button>
      <button onclick="sendEffect('欢呼')">欢呼</button>
      <button onclick="sendEffect('鼓点')">鼓点</button>
    </div>
    <input id="customEffect" placeholder="自定义效果名称，例如：尖叫" />
    <button style="margin-top:8px" onclick="sendCustomEffect()">触发自定义效果</button>
    <div class="msg" id="effectMsg">等待操作...</div>
  </div>

  <script>
    let tracks = [];
    let backendState = null;

    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"']/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function getTrackLabel(track) {
      return `${track.performer || '未知演出人'} - ${track.programName || '未命名节目'}`;
    }

    function encodeTrackId(trackId) {
      return encodeURIComponent(String(trackId || ''));
    }

    function renderStatus() {
      const status = document.getElementById('playStatus');
      if (!backendState) {
        status.innerHTML = '<span>状态：未知</span>';
        return;
      }

      const stateMap = {
        playing: '播放中',
        paused: '已暂停',
        stopping: '停止中',
        stopped: '已停止',
        idle: '空闲'
      };

      const current = backendState.currentTrack
        ? `${backendState.currentTrack.performer || '未知演出人'} - ${backendState.currentTrack.programName || '未命名节目'}`
        : '暂无';

      status.innerHTML = `
        <span>状态：${stateMap[backendState.state] || backendState.state || '未知'}</span>
        <span>播放器：${backendState.driver || '未检测到'}</span>
        <span>当前曲目：${escapeHtml(current)}</span>
        ${backendState.errorMessage ? `<span>错误：${escapeHtml(backendState.errorMessage)}</span>` : ''}
      `;
    }

    function renderTracks() {
      const container = document.getElementById('trackList');
      if (!tracks.length) {
        container.innerHTML = '<div class="msg">暂无可播放音频，请先上传文件。</div>';
        return;
      }

      const activeSavedName = String(backendState?.currentTrack?.savedName || '');
      container.innerHTML = tracks.map((track) => {
        const isActive = activeSavedName && activeSavedName === String(track.savedName || '');
        return `
          <div class="track-item ${isActive ? 'active' : ''}">
            <div class="track-title">${escapeHtml(getTrackLabel(track))}</div>
            <div class="track-meta">文件：${escapeHtml(track.fileName || track.savedName || '未绑定音频')}</div>
            <div class="track-actions">
              <button onclick="playTrackById('${encodeTrackId(track.id)}')" ${track.savedName ? '' : 'disabled'}>播放到后端</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function refreshPageData() {
      await Promise.all([fetchTracks(), fetchBackendState()]);
      renderStatus();
      renderTracks();
    }

    async function fetchTracks() {
      const result = await fetch('/v1/musiclist');
      const data = await result.json();
      tracks = Array.isArray(data.musicList) ? data.musicList : [];
    }

    async function fetchBackendState() {
      const result = await fetch('/v1/music/backend-state');
      const data = await result.json();
      backendState = data && data.success ? data.state : null;
    }

    async function playTrack(trackId) {
      const msg = document.getElementById('playMsg');
      const targetTrack = tracks.find((item) => String(item.id || '') === String(trackId || ''));
      if (!targetTrack || !targetTrack.savedName) {
        msg.textContent = '该节目没有绑定可播放音频';
        return;
      }

      try {
        const response = await fetch('/v1/music/backend-play', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            fileName: targetTrack.savedName,
            trackId: targetTrack.id,
            performer: targetTrack.performer,
            programName: targetTrack.programName
          })
        });
        const data = await response.json();
        if (!data.success) {
          throw new Error(data.message || '播放失败');
        }

        backendState = data.state;
        renderStatus();
        renderTracks();
        msg.textContent = `已切到后端播放：${getTrackLabel(targetTrack)}`;
      } catch {
        msg.textContent = '播放失败，请检查网络或服务状态';
      }
    }

    function playTrackById(encodedTrackId) {
      playTrack(decodeURIComponent(String(encodedTrackId || '')));
    }

    async function controlBackend(action) {
      const msg = document.getElementById('playMsg');
      try {
        const response = await fetch('/v1/music/backend-control', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action })
        });
        const data = await response.json();
        if (!data.success) {
          throw new Error(data.message || '控制失败');
        }

        backendState = data.state;
        renderStatus();
        renderTracks();
        const labelMap = { pause: '暂停', resume: '恢复', stop: '停止' };
        msg.textContent = `已发送后端${labelMap[action] || action}指令`;
      } catch {
        msg.textContent = '发送失败，请检查网络';
      }
    }

    async function sendEffect(effectName) {
      const msg = document.getElementById('effectMsg');
      try {
        await fetch('/v1/live/effect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ effectName })
        });
        msg.textContent = `已触发效果：${effectName}`;
      } catch {
        msg.textContent = '发送失败，请检查网络';
      }
    }

    function sendCustomEffect() {
      const input = document.getElementById('customEffect');
      const name = String(input.value || '').trim();
      if (!name) return;
      sendEffect(name);
      input.value = '';
    }

    refreshPageData();
    setInterval(refreshPageData, 5000);
  </script>
</body>
</html>
